name: Release Charts

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          charts_dir: ./chart
          mark_as_latest: false

  oci:
    permissions:
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Extract chart metadata
        id: chart
        run: |
          version=$(grep '^version:' chart/proxmox-exporter/Chart.yaml | awk '{print $2}')
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "owner=$owner" >> "$GITHUB_OUTPUT"

      - name: Check if version already exists
        id: check
        run: |
          if helm pull "oci://ghcr.io/${{ steps.chart.outputs.owner }}/charts/proxmox-exporter" --version "${{ steps.chart.outputs.version }}" 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Chart version ${{ steps.chart.outputs.version }} already exists in OCI registry, skipping push"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package chart
        if: steps.check.outputs.exists == 'false'
        run: helm package chart/proxmox-exporter

      - name: Push chart to GHCR
        if: steps.check.outputs.exists == 'false'
        run: helm push "proxmox-exporter-${{ steps.chart.outputs.version }}.tgz" "oci://ghcr.io/${{ steps.chart.outputs.owner }}/charts"

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Tag chart as latest
        run: oras tag "ghcr.io/${{ steps.chart.outputs.owner }}/charts/proxmox-exporter:${{ steps.chart.outputs.version }}" latest
